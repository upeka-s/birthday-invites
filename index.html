<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spy Mission Birthday Invite</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="invite">
  <h1>You’re Invited!</h1>
  <div id="party-details">
    <p>Date: <span id="date"></span></p>
    <p>Time: <span id="time"></span></p>
    <p>Location: <span id="location"></span></p>
    <p>RSVP: <span id="rsvp"></span></p>
  </div>
  <button id="startBtn">Start Mission 🎮</button>
  <div id="game" class="hidden">
    <p id="question"></p>
    <div id="options"></div>
    <p id="feedback"></p>
  </div>
</div>

<script src="script.js"><script>
  // 1. Paste your URL here at the very top of the script section
  const webAppUrl = "https://script.google.com/macros/s/XXXXX/exec"; 

  // 2. This function captures the form data and sends it
  async function handleRSVP(event) {
    event.preventDefault(); // Prevents the page from refreshing
    
    const name = document.getElementById('guestName').value;
    const status = document.getElementById('attendanceStatus').value;

    const data = {
      name: name,
      attendance: status,
      guests: 1
    };

    // 3. The "Postman" that delivers the data to Google
    fetch(webAppUrl, {
      method: "POST",
      mode: "no-cors",
      cache: "no-cache",
      body: JSON.stringify(data)
    });

    alert("Thanks " + name + "! Your RSVP is recorded.");
    document.getElementById('rsvpForm').reset(); // Clears the form
  }
</script></script>
</body>
</html>
