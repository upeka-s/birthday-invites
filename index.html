<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spy Mission Birthday Invite</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="invite">
  <h1>You’re Invited!</h1>
  <div id="party-details">
    <p>Date: <span id="date"></span></p>
    <p>Time: <span id="time"></span></p>
    <p>Location: <span id="location"></span></p>
    <p>RSVP: <span id="rsvp"></span></p>

    <div id="rsvp-container" style="padding: 20px; text-align: center;">
    <h2>RSVP</h2>
    <p>Please let us know if you can make it!</p>
    
    <form id="rsvpForm">
        <input type="text" id="guestName" placeholder="Your Full Name" required 
               style="display: block; width: 80%; margin: 10px auto; padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
        
        <select id="attendanceStatus" 
                style="display: block; width: 80%; margin: 10px auto; padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
            <option value="Yes">Yes, I'll be there! 🎉</option>
            <option value="No">Sorry, I can't make it 😢</option>
        </select>

      <div id="rsvp-container">
    <input type="text" id="guestName" placeholder="Your Name">
    <button type="button" onclick="sendRSVP()">Confirm RSVP</button>
</div>

        <button type="submit" 
                style="background-color: #ff4757; color: white; padding: 10px 30px; border: none; border-radius: 25px; cursor: pointer; font-size: 18px;">
            Confirm RSVP
        </button>
    </form>
</div>
  </div>
  <button id="startBtn">Start Mission 🎮</button>
  <div id="game" class="hidden">
    <p id="question"></p>
    <div id="options"></div>
    <p id="feedback"></p>
  </div>
</div>

<script src="script.js"><script>
  <script>
  // Replace this with your actual Google Script URL

  async function sendRSVP() {
    // 1. Get the values from the HTML inputs
    const nameValue = document.getElementById('guestName').value;
  const webAppUrl = "https://script.google.com/macros/s/AKfycbzV5RWRofVMkhj4aAaywQF9YwwUzwKEoUyc6ZIhOsyDTVPIJEcJD6BC8SJjddjJnlI9hw/exec"; 

    // 2. THIS IS THE DATA OBJECT (Place it here!)
    const data = {
        name: nameValue,
        attendance: "Yes",
        totalGuests: 1 // This matches the 'totalGuests' we put in your Google Script
    };

    // 3. Send the data object to Google
    console.log("Sending package:", data);

    try {
        await fetch(webAppUrl, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify(data) // This turns the object into text for the trip
        });
        alert("Success! " + nameValue + " added to the list.");
    } catch (error) {
        console.error("Error:", error);
    }
}
  });
</script>
</script></script>
</body>
</html>
