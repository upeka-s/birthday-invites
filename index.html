<!DOCTYPE html>
<html>
<head>
    <title>Birthday Invite</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f0f0f0; }
        .card { background: white; padding: 20px; border-radius: 10px; display: inline-block; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        input, select, button { display: block; width: 100%; margin: 10px 0; padding: 10px; }
        button { background: #D4AF37; color: white; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h1>You're Invited!</h1>
        <p>Please RSVP below:</p>
        
        <input type="text" id="guestName" placeholder="Your Name">
        
        <select id="attendance">
            <option value="Yes">Attending</option>
            <option value="No">Not Attending</option>
        </select>

        <select id="totalGuests">
            <option value="1">1 Person</option>
            <option value="2">2 People</option>
        </select>

        <button type="button" onclick="sendRSVP()">Confirm RSVP</button>
        <p id="msg"></p>
    </div>

    <script>
        async function sendRSVP() {
            // 1. YOUR URL GOES HERE
            const url = "PASTE_YOUR_URL_HERE"; 
            
            const name = document.getElementById('guestName').value;
            if(!name) { alert("Enter a name!"); return; }

            const data = {
                name: name,
                attendance: document.getElementById('attendance').value,
                totalGuests: document.getElementById('totalGuests').value
            };

            document.getElementById('msg').innerText = "Sending...";

            try {
                await fetch(url, {
                    method: "POST",
                    mode: "no-cors",
                    body: JSON.stringify(data)
                });
                document.getElementById('msg').innerText = "Success! Check your sheet.";
            } catch (e) {
                document.getElementById('msg').innerText = "Error. Check Console.";
            }
        }
    </script>
</body>
</html>
