<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spy Mission Birthday Invite</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="invite">
  <h1>You’re Invited!</h1>
  <div id="party-details">
    <p>Date: <span id="date"></span></p>
    <p>Time: <span id="time"></span></p>
    <p>Location: <span id="location"></span></p>
    <p>RSVP: <span id="rsvp"></span></p>

    <div id="rsvp-container" style="padding: 20px; text-align: center;">
    <h2>RSVP</h2>
    <p>Please let us know if you can make it!</p>
    
    <form id="rsvpForm">
        <input type="text" id="guestName" placeholder="Your Full Name" required 
               style="display: block; width: 80%; margin: 10px auto; padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
        
        <select id="attendanceStatus" 
                style="display: block; width: 80%; margin: 10px auto; padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
            <option value="Yes">Yes, I'll be there! 🎉</option>
            <option value="No">Sorry, I can't make it 😢</option>
        </select>

        <button type="submit" 
                style="background-color: #ff4757; color: white; padding: 10px 30px; border: none; border-radius: 25px; cursor: pointer; font-size: 18px;">
            Confirm RSVP
        </button>
    </form>
</div>
  </div>
  <button id="startBtn">Start Mission 🎮</button>
  <div id="game" class="hidden">
    <p id="question"></p>
    <div id="options"></div>
    <p id="feedback"></p>
  </div>
</div>

<script src="script.js"><script>
  <script>
  // Replace this with your actual Google Script URL
  const webAppUrl = "https://script.google.com/macros/s/AKfycbwNqmZkluA0uxO1hI11QBCUI1ykhFoqsK75QinHpAk1XvcfKrv9FxkPZZbxO9RFIcia9g/exec"; 

  const rsvpForm = document.getElementById('rsvpForm');

  rsvpForm.addEventListener('submit', function(e) {
    e.preventDefault(); // Stops the page from refreshing

    const name = document.getElementById('guestName').value;
    const status = document.getElementById('attendanceStatus').value;

    const data = {
      name: name,
      attendance: status,
      guests: 1
    };

    // Send data to Google Sheets
    fetch(webAppUrl, {
      method: "POST",
      mode: "no-cors",
      body: JSON.stringify(data)
    })
    .then(() => {
      alert("Thanks " + name + "! Your RSVP has been sent.");
      rsvpForm.reset(); // Clears the form
    })
    .catch(err => alert("Error sending RSVP. Please try again."));
  });
</script>
</script></script>
</body>
</html>
